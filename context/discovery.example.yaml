# Discovery 設定の例。
# queue/projects/<project>/discovery.yaml として配置すると、watcher (watch.sh) が
# 低頻度 (既定 15 分) で走査し、新規の仕事を queue/_inbox.md に積む。
#
# 形式はフラット（watcher が grep で 1 行ずつ読むため、ネスト・複数行は不可）。
# 値はカンマ区切り。クォートは付けても付けなくてもよい。

enabled: true                      # false で無効化
repo: /path/to/my-app              # ローカル checkout（todo 走査に使用。todo を使わないなら省略可）
gh_repo: owner/my-app              # gh 用 owner/repo（issues / ci / pr に使用）
sources: issues,pr,ci,todo         # 走査する種別（カンマ区切り。省略時は全部）
issue_labels: ready                # issues: このラベルだけ拾う（カンマ区切り。空なら全 open）
todo_paths: src,tests              # todo: 走査するサブパス（repo 相対。カンマ区切り）

# 挙動メモ:
# - SEEN ファイル (queue/.discovery_seen) が無い初回は、既存 backlog を黙って既知化
#   （起動直後に大量起票しない）。以降は新規出現分だけループに乗る。
# - 新規ゼロが続くと、throttle (既定 4h) 付きで [SWEEP] 周回レビューを 1 件投げる。
# - 1 サイクルで inbox に積む新規上限は既定 10（WATCH_DISCOVERY_MAX で調整）。
