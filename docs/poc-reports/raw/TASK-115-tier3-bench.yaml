analysis:
  save_throughput:
    verdict: passed
    note: >
      42,303〜43,276 ops/sec。Tier-1 (31,805) → Tier-2 (37,053) → Tier-3 (42,303) と
      workers=10 の並列効果でスループットは増加傾向。save は非同期 fire-and-forget なので
      データ量によらず安定。

  search_latency:
    verdict: concern
    note: >
      DB件数とlatencyの相関:
        100件 → ~21ms、1000件 → ~55ms、6100件 → ~470-760ms、16100件 → ~1.4-2.3s
      全件走査 (tomb_expr + obs_expr) の線形スケーリングが顕著。
      n=5000 投入後 (DB ~6100件) で search が全 limit で 469〜759ms と 500ms 前後。
      n=10000 投入後 (DB ~16100件) で 1.4〜2.3s に到達。
      Issue #5 の想定「500ms 以下」を DB ~6000件超で超過する。

  overall_verdict: concern
  concerns:
    - >
      search 全件走査の線形スケーリング: 6000件で500ms前後、16000件で2s超。
      実運用でエージェントが数万件の observation を蓄積すると
      MCP経由の検索が実用的でなくなる可能性がある。
      別 Issue として FTS インデックス or Zenoh queryable フィルタリングの検討を推奨。
    - >
      limit 値によらず latency がほぼ一定（tomb + obs を全件スキャンしてから slice）。
      limit=10 でも 610ms かかるのはこの実装の根本的な特性。
    - >
      n=10000 (DB ~16000件) で search が 2s 超。この規模では search_observations が
      タイムアウト (GET_TIMEOUT=5.0s) に近づく可能性あり。

  new_issue_candidate:
    title: "search_observations: implement server-side filtering to avoid full scan"
    description: >
      現在の実装は tomb_expr と obs_expr を全件取得後に Python 側でフィルタリング。
      DB が数千件を超えると latency が線形増加し実用性が低下する。
      Zenoh queryable の活用または SQLite/FTS5 バックエンドへの移行を検討すべき。
    priority: medium
