  - "TASK-102 hypothesis confirmed at 24h scale: initial_alignment fires immediately, partition duration is irrelevant to alignment trigger."
  # yamllint disable-line rule:line-length
  - "Cold-era convergence is a step-function: Office returns 0 until full transfer completes, then jumps to whole count. No partial / monotonically-increasing observation."
  # yamllint disable-line rule:line-length
  - "G2 30-sec target is unrealistic for cold-era Discovery with 1000+ obs. Design hypothesis §5.2 already noted this risk."
  - "Tombstone semantics work cleanly across post-recovery sync (existence-based deletion preserved)."
