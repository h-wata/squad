key_findings:
  - finding: "timedatectl 'synchronized: yes / NTP service: active' is NOT a guarantee of inter-host clock alignment"
    severity: notice
    # yamllint disable-line rule:line-length
    impact: "Operators relying solely on systemd-timesyncd status may have undetected multi-second drift; --since-iso filtering and tombstone TTL evaluation are silently affected"

  - finding: "Replication and integrity (md5 of obs IDs) survives at least up to +10s clock skew"
    severity: positive
    impact: "Cold/hot era classification at small skew (<60s) does not break sync"

  - finding: "Tombstone retention semantics under skew not yet tested (route C)"
    severity: open
    impact: "GC + skew interaction is the GC test (TASK-121 design) responsibility"

  - finding: "chrony not installed on either host; manual recovery only via timedatectl set-time/set-ntp"
    severity: notice
    impact: "Operational guidance should recommend installing chrony for makestep-style strict alignment"

new_issue_candidates:
