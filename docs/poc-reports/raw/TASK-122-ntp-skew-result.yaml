    # yamllint disable-line rule:line-length
    body_summary: "Since --since-iso filter and tombstone TTL evaluations rely on host wall clock, operators should be advised to install chrony or equivalent for sub-second alignment. timedatectl status alone is insufficient."
    target_repo: "h-wata/mesh-mem"
