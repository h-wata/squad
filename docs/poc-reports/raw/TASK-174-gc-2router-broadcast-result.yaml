acceptance_criteria_check:
  - criterion: "Pre-condition: known shared (observation_id, project) on both Home and Office"
    result: PASS
    evidence: "Office Phase 2 search returned the 5 IDs Home saved"
  - criterion: "Run mesh-mem gc --retention-days 0 --project phase4-gc-test on Home"
    result: PASS
    evidence: "Phase 4 (3 purged) + Phase 7 (2 purged) = 5 total physical purges"
  # yamllint disable-line rule:line-length
  - criterion: "Verify deleted observations are no longer surfaced by Office's mesh-mem search (user-visible behavior reflects deletion+gc)"
    result: PASS
    evidence: |
      Office search post-Home-delete (Phase 5) = 2 live (matches Home's 2 un-deleted);
      Phase 8 = 0 live. Indicates Office's read path applies tombstones consistently
      with Home. NOTE: criterion intentionally narrowed from the original "tombstones
      reach Office RocksDB store" wording — see PARTIAL row below for what was NOT
      verified.
  # yamllint disable-line rule:line-length
  - criterion: "Original AC: Office RocksDB store physically contains the propagated tombstones / propagated obs are physically removed by Home's gc"
    result: PARTIAL
    evidence: |
      Not directly verified. The Phase 5 / Phase 8 checks used a fresh Office state
      dir which rebuilds the local SQLite from Zenoh — they prove the user-visible
      view but do not inspect Office's zenohd RocksDB on disk. Whether Office still
      retains zombie tombstones (until its own gc), or whether Home's gc broadcast
      a physical purge to Office, is open. Follow-up: query Office's zenohd directly
      (e.g. via `zenoh-rest` or RocksDB introspection) for tombstone keys after a
      Home gc, and compare counts before/after.
  - criterion: "Verify Office mesh-mem search --project <test-project> returns 0 rows after broadcast settles"
    result: PASS
    evidence: "Phase 8 office_live_count = 0; CLI message 該当するメモリはありません"
  - criterion: "Record latency from gc completion to Office-side disappearance"
    result: PARTIAL
    evidence: |
      Phase 5 / Phase 8 used a fresh Office state dir which rebuilds the local
      SQLite from current Zenoh state, so the measurement is "tombstones
      visible to Office" rather than "Home gc → Office reflects". The
      tombstone broadcast latency itself was within the script's 8s sleep
      windows (no specific sub-second measurement).

caveats:
  - |
    "index subscriber on_tomb/on_obs error" warnings appear during gc.
    These come from the long-running mesh-mem-mcp process (PIDs 109971,
    437349) which subscribes to mem/** and fails to decode some payloads.
    They are NOT from the gc CLI itself and do not affect the test result.
    A separate issue may be filed for the JSON-decode robustness of the
    mcp subscriber.
  - |
    gc duration of 60.064s is suspicious — it matches the script's
    `timeout 60` exactly. The actual purge logic completed and printed
    a success message inside the budget, but elapsed wall-time landed at
    the boundary. Worth re-running with a larger timeout to get a true
    duration measurement, but not blocking for this Phase 4 verification.
  - |
    The 132MB SQLite + 130MB WAL on Home (production state dir) makes
    Zenoh full-scan searches (MESH_MEM_DISABLE_INDEX=1) timeout. The
    test was run with a fresh state dir (/tmp/phase4_state_*) to avoid
    this; the production store was untouched.

summary: |
  Issue #28 (GC 2-router broadcast Phase 4) checked whether mesh-mem gc
  on Home reflects on the Office side via Zenoh replication.

  RESULT: PASS **for the user-visible contract only** — after Home's
  `gc --retention-days 0 --project phase4-gc-test`, Office's `mesh-mem
  search` for the same project correctly returns 0 rows once all obs
  are deleted+gc'd on Home. The SQLite filter path on the Office read
  side correctly applies tombstones it has received.

  EXPLICITLY NOT VERIFIED in this run:
  - Whether the tombstones actually reached Office's zenohd RocksDB
    on disk (tested only that fresh Office clients rebuild a view that
    excludes the deleted obs).
  - Whether Home's gc broadcast a physical purge to Office, or Office
    still carries the tombstones as zombie entries until its own gc
    runs. Follow-up: directly inspect Office zenohd's RocksDB.

  Other follow-ups:
  - mesh-mem-mcp subscriber JSON decode warnings (separate JSON
    payload robustness concern).
