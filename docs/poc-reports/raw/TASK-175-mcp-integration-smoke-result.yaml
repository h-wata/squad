incidental_findings:
  - finding: "claude -p requires --permission-mode bypassPermissions for MCP tool use"
    severity: NICE-TO-DOC
    detail: |
      Without --permission-mode bypassPermissions, the first MCP tool call
      records a permission_denial entry in the JSON output and the LLM
      replies with a "permission needed" text message. This is correct
      behavior (no UI in -p mode) but is a friction point for automated
      smoke testing. Worth a one-line note in the README CI/Testing section.
  - finding: "fastmcp first-launch race: mesh-mem-mcp's first health probe can fail with 'Failed to connect'"
    severity: NICE-TO-DOC
    detail: |
      Observed once during initial registration check on WSL2. Resolved by
      a 10-second wait + retry. Likely fastmcp's initialization vs Claude's
      health-check timing.
  - finding: "Each claude -p call takes ~23-27 seconds even for a one-liner MCP tool call"
    severity: BENIGN
    detail: |
      Most of that time is Claude API round-trip; MCP tool execution itself
      is sub-second. Not actionable, but useful baseline for future
      automated smoke timing budgets.

caveats:
  - |
    Test was performed with bypassPermissions, so this verifies the tool
    invocation mechanics but NOT the user-permission UI flow that a typical
    interactive Claude Code user would see on first run. The interactive
    permission flow is **out of scope / not evaluated** in this smoke and
    must be exercised separately (e.g. interactive `claude` session) before
    we can claim anything about it.
  - |
    The 3-host mesh (Home + Office + WSL2) was established earlier in the
    same session for this test; results assume that topology. Single-host
    MCP smoke would also pass and gives a cleaner pass/fail; the 3-host
    arrangement just confirms the MCP layer doesn't accidentally short-circuit
    the mesh.

summary: |
  Issue #29 (MCP integration smoke test) verifies that mesh-mem-mcp running
  under stdio transport from a real Claude Code 2.1.41 client receives natural-
  language prompts, picks the correct MCP tool (save / search / status /
  delete), passes well-formed arguments including 32-char observation_ids,
  and persists / propagates the data through the mesh.

  RESULT: PASS for all 5 cases. Total wall time ~2 minutes of automated
  claude -p calls; no human-in-the-loop interaction required once
  bypassPermissions was discovered.

  The test was run on the WSL2 host that joined the 3-host mesh earlier in
  the same session. The Case 4 status output (pc 8151... = WSL2 with 2 obs;
  pc fb7e... = Home with 9998 obs) is concrete evidence that the MCP layer
  is reading real mesh-replicated data, not just local state.

  Issue #5 AC-6 (MCP integration smoke) is now closed via this run.
