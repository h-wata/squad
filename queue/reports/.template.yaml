# 報告テンプレート
# このファイルをコピーして {agent}_report.yaml として使用

task_id: TASK-XXX
agent: coder  # coder / reviewer / documenter / log_analyzer
status: completed  # completed / in_progress / blocked / needs_review
summary: "作業結果の概要を1-2文で"
details: |
  詳細な作業内容や結果をここに記述。
  必要に応じて複数行で記載。
changes:  # コード変更がある場合
  - file: path/to/file.py
    type: created  # created / modified / deleted
    description: "変更内容"
blockers: []  # ブロッカーがあれば記述
# - "ブロッカーの説明"
suggestions:  # 改善提案があれば
  - "提案1"
next_steps:  # 後続作業の提案
  - "次のステップ1"
completed_at: ""  # ISO8601形式: 2024-01-01T12:00:00
